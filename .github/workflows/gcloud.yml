name: Deploy to Google Cloud

on:
    push:
        branches: ["main"]

jobs:
    build-client:
        runs-on: ubuntu-latest
        environment: gcloud
        env:
            REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Create client .env for React build
              working-directory: client
              run: |
                  env | grep '^REACT_APP_' > .env

            - name: Build client
              working-directory: client
              run: |
                  npm install -g pnpm
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Upload client build
              uses: actions/upload-artifact@v4
              with:
                  name: client-build
                  path: client/build

    build-server:
        runs-on: ubuntu-latest
        environment: gcloud
        outputs:
            image: ${{ steps.set-image.outputs.image }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v2
              with:
                  project_id: ${{ vars.GCP_PROJECT_ID }}

            - name: Configure Docker
              run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

            - name: Build and push server image
              working-directory: server
              id: set-image
              run: |
                  IMAGE_BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${{ vars.GCP_CLOUD_RUN_SERVICE }}"
                  IMAGE_SHA="$IMAGE_BASE:$(git rev-parse --short HEAD)"
                  IMAGE_LATEST="$IMAGE_BASE:latest"

                  docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
                  docker push "$IMAGE_SHA"
                  docker push "$IMAGE_LATEST"

                  echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

    deploy:
        runs-on: ubuntu-latest
        environment: gcloud
        needs: [build-client, build-server]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_SA_KEY }}

            - name: Activate service account
              run: |
                  cat <<EOF > key.json
                  ${{ secrets.GCP_SA_KEY }}
                  EOF
                  gcloud auth activate-service-account --key-file=key.json
                  rm key.json

            - name: Download client build artifact
              uses: actions/download-artifact@v4
              with:
                  name: client-build
                  path: build

            - name: Deploy server to Cloud Run
              run: |
                  gcloud run deploy ${{ vars.GCP_CLOUD_RUN_SERVICE }} \
                    --image ${{ needs.build-server.outputs.image }} \
                    --region ${{ vars.GCP_REGION }} \
                    --platform managed \
                    --allow-unauthenticated

            - name: Upload client to GCS
              run: |
                  gsutil -m rsync -r build gs://${{ vars.GCP_BUCKET }}
