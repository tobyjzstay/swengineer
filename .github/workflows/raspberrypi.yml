name: Deploy to Raspberry Pi

on:
    push:
        branches: ["main"]

jobs:
    build-client:
        runs-on: ubuntu-latest
        environment: raspberrypi
        env:
            REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Create client .env for React build
              working-directory: client
              run: |
                  env | grep '^REACT_APP_' > .env

            - name: Build client
              working-directory: client
              run: |
                  npm install -g pnpm
                  pnpm install --frozen-lockfile
                  pnpm build

            - name: Upload client build
              uses: actions/upload-artifact@v4
              with:
                  name: client-build
                  path: client/build

    build-server:
        runs-on: ubuntu-latest
        environment: raspberrypi
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build server and save Docker image
              working-directory: server
              run: |
                  IMAGE="server-image:$(git rev-parse --short HEAD)"
                  docker buildx build \
                    --platform linux/arm64 \
                    -t "$IMAGE" \
                    --load .
                  echo "$IMAGE" > image.txt
                  docker save "$IMAGE" -o server-image.tar

            - name: Upload server artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: server-artifacts
                  path: |
                      server/image.txt
                      server/server-image.tar

    deploy:
        runs-on: ubuntu-latest
        environment: raspberrypi
        needs: [build-client, build-server]
        steps:
            - name: Download client build
              uses: actions/download-artifact@v4
              with:
                  name: client-build
                  path: client/build

            - name: Download server artifacts
              uses: actions/download-artifact@v4
              with:
                  name: server-artifacts
                  path: server

            - name: Install cloudflared
              run: |
                  curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
                  sudo dpkg -i cloudflared.deb

            - name: Setup SSH key and config
              env:
                  CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
                  CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa

                  cat >> ~/.ssh/config <<EOF
                  Host pi
                      HostName ${{ secrets.PI_HOSTNAME }}
                      User ${{ secrets.PI_USER }}
                      StrictHostKeyChecking no
                      ProxyCommand cloudflared access ssh \
                        --hostname ${{ secrets.PI_HOSTNAME }} \
                        --service-token-id $CF_ACCESS_CLIENT_ID \
                        --service-token-secret $CF_ACCESS_CLIENT_SECRET
                  EOF
                  chmod 600 ~/.ssh/config

            - name: Deploy to Pi via SSH
              env:
                  CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
                  CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
              run: |
                  echo "Client ID length: ${#CF_ACCESS_CLIENT_ID}"
                  echo "Client Secret length: ${#CF_ACCESS_CLIENT_SECRET}"
                  echo "=============================================="
                  ssh -o ProxyCommand="cloudflared access ssh \
                    --hostname ${{ secrets.PI_HOSTNAME }} \
                    --service-token-id $CF_ACCESS_CLIENT_ID \
                    --service-token-secret $CF_ACCESS_CLIENT_SECRET" \
                    ${{ secrets.PI_USER }}@${{ secrets.PI_HOSTNAME }} -v exit

                  rsync -avz -e "ssh -o ProxyCommand='cloudflared access ssh \
                    --hostname ${{ secrets.PI_HOSTNAME }} \
                    --service-token-id $CF_ACCESS_CLIENT_ID \
                    --service-token-secret $CF_ACCESS_CLIENT_SECRET'" \
                    client/build/ ${{ secrets.PI_USER }}@${{ secrets.PI_HOSTNAME }}:${{ vars.DEPLOY_TARGET }}/
                  echo "=============================================="
                  rsync -avz client/build/ pi:${{ vars.DEPLOY_TARGET }}/
                  echo "=============================================="
                  ssh pi << 'EOF'
                    cd ~/swengineer/server
                    IMAGE=$(cat image.txt)
                    docker load -i server-image.tar
                    docker stop swengineer || true
                    docker rm swengineer || true
                    docker run -d --name swengineer -p ${{ vars.PORT }}:${{ vars.PORT }} $IMAGE
                  EOF
